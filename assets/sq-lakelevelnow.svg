      <style>
        .c{width:100%;height:100%;background:#13100c;border:1px solid #2a241d;border-radius:8px;padding:16px;box-sizing:border-box;display:flex;flex-direction:column;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
        .t{color:#e6edf3;font:600 15px/1.25 ui-monospace,monospace;margin:0}
