<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 110" width="100%">
  <foreignObject x="0" y="0" width="840" height="110">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .as-container {
          background: #13100c;
          border: 1px solid #2a241d;
          border-radius: 6px;
          padding: 16px 20px;
          box-sizing: border-box;
          font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
        }
        .as-header {
          color: #f5f1eb;
          font-size: 14px;
          font-weight: 600;
          margin: 0 0 10px 0;
        }
        .as-badges {
          display: flex;
          flex-wrap: wrap;
          gap: 8px;
          margin: 0 0 10px 0;
        }
        .as-badge {
          background: #0d1117;
          border: 1px solid #30363d;
          border-radius: 16px;
          padding: 4px 10px;
          font-size: 12px;
          color: #a89b8a;
          display: inline-block;
          white-space: nowrap;
        }
        .as-badge-more {
          background: #0d1117;
          border: 1px solid #30363d;
          border-radius: 16px;
          padding: 4px 10px;
          font-size: 12px;
          color: #7a6f62;
          display: inline-block;
          white-space: nowrap;
        }
        .as-detail {
          color: #7a6f62;
          font-size: 13px;
          margin: 0;
        }
        .as-repo {
          color: #d97757;
        }
      </style>
      <div class="as-container">
        <p class="as-header">47,886 contributions in the last year</p>
        <div class="as-badges">
          <span class="as-badge">@microlinkhq</span>
          <span class="as-badge">@BeLikeNative</span>
          <span class="as-badge">@scriptscat</span>
          <span class="as-badge-more">+ More</span>
        </div>
        <p class="as-detail">Contributed to <span class="as-repo">chrome-tips</span>, <span class="as-repo">claude-skills-guide</span>, <span class="as-repo">ai-tools-compared</span> and 752 other repositories</p>
      </div>
    </div>
  </foreignObject>
</svg>
