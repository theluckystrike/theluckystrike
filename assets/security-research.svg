<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 420" width="100%" fill="none">
  <foreignObject x="0" y="0" width="840" height="420">
    <div xmlns="http://www.w3.org/1999/xhtml" style="width:840px;height:420px;">
      <style>
        .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;height:100%;box-sizing:border-box}
        .card{background:#13100c;border:1px solid #2a241d;border-radius:6px;padding:18px;box-sizing:border-box;overflow:hidden}
        .card.featured{border-color:#d97757}
        .title{color:#e6edf3;font:500 16px/1.3 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;margin:0 0 6px}
        .badge{display:inline-block;background:#d97757;color:#13100c;font:600 11px/1 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;padding:2px 6px;border-radius:3px;margin-left:8px;vertical-align:middle}
        .desc{color:#a89b8a;font:400 13px/1.4 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;margin:0 0 10px}
        .stats{margin:0 0 10px;padding:0;list-style:none}
        .stats li{font:400 12px/1.8 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:#a89b8a}
        .stats li span.k{color:#7a6f62;display:inline-block;width:105px}
        .stats li span.v{color:#e6edf3}
        .links{font:400 12px/1 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
        .links a{color:#d97757;text-decoration:none}
        .links .sep{color:#7a6f62;margin:0 2px}
      </style>
      <div class="grid">
        <div class="card featured">
          <p class="title">vulnerability research<span class="badge">ACTIVE</span></p>
          <p class="desc">55+ reports filed via GitHub Private Vulnerability Reporting</p>
          <ul class="stats">
            <li><span class="k">scope</span> <span class="v">mlflow · keras · sglang</span></li>
            <li><span class="k"></span> <span class="v">nltk · gradio · feast</span></li>
            <li><span class="k">focus</span> <span class="v">pickle deserialization · sql injection</span></li>
            <li><span class="k">method</span> <span class="v">static analysis · source code review</span></li>
          </ul>
        </div>
        <div class="card">
          <p class="title">research areas</p>
          <p class="desc">AI/ML infrastructure security</p>
          <ul class="stats">
            <li><span class="k">sglang</span> <span class="v">36 pickle.loads instances audited</span></li>
            <li><span class="k">feast</span> <span class="v">f-string sqli across 12 backends</span></li>
            <li><span class="k">mlflow</span> <span class="v">model deserialization vectors</span></li>
            <li><span class="k">keras</span> <span class="v">model loading attack surface</span></li>
          </ul>
        </div>
        <div class="card">
          <p class="title">methodology</p>
          <p class="desc">Source-level review across web and blockchain</p>
          <ul class="stats">
            <li><span class="k">application</span> <span class="v">static analysis · code review</span></li>
            <li><span class="k">blockchain</span> <span class="v">solidity smart contract auditing</span></li>
            <li><span class="k">defi</span> <span class="v">protocol analysis · pipeline scan</span></li>
          </ul>
        </div>
        <div class="card">
          <p class="title">platforms</p>
          <p class="desc">Active vulnerability disclosure programs</p>
          <ul class="stats">
            <li><span class="k">web/ml</span> <span class="v">github pvr · huntr</span></li>
            <li><span class="k">blockchain</span> <span class="v">immunefi · sherlock · cantina</span></li>
            <li><span class="k">status</span> <span class="v">active researcher</span></li>
          </ul>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
