<svg xmlns="http://www.w3.org/2000/svg" width="800" height="210" viewBox="0 0 800 210">
  <style>
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    @keyframes typing1 {
      0%, 8% { width: 0; }
      20%, 100% { width: 370px; }
    }
    @keyframes typing2 {
      0%, 28% { width: 0; }
      45%, 100% { width: 295px; }
    }
    @keyframes typing3 {
      0%, 52% { width: 0; }
      72%, 100% { width: 385px; }
    }
    @keyframes fadein {
      0%, 78% { opacity: 0; }
      90%, 100% { opacity: 1; }
    }
    @media (prefers-color-scheme: light) {
      .bg { fill: #f6f8fa; }
      .border-line { stroke: #d0d7de; }
      .title-bar { fill: #f6f8fa; }
      .title-text { fill: #1f2328; }
      .prompt { fill: #6e40c9; }
      .cmd-text { fill: #1f2328; }
      .comment { fill: #6e7781; }
      .highlight { fill: #6e40c9; }
    }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0d1117; }
      .border-line { stroke: #30363d; }
      .title-bar { fill: #161b22; }
      .title-text { fill: #c9d1d9; }
      .prompt { fill: #a78bfa; }
      .cmd-text { fill: #c9d1d9; }
      .comment { fill: #6e7781; }
      .highlight { fill: #a78bfa; }
    }
    /* Default to dark */
    .bg { fill: #0d1117; }
    .border-line { stroke: #30363d; }
    .title-bar { fill: #161b22; }
    .title-text { fill: #c9d1d9; }
    .prompt { fill: #a78bfa; }
    .cmd-text { fill: #c9d1d9; }
    .comment { fill: #6e7781; }
    .highlight { fill: #a78bfa; }
    .cursor {
      animation: blink 1s step-end infinite;
    }
    .line1 { overflow: hidden; animation: typing1 6s steps(30) forwards; }
    .line2 { overflow: hidden; animation: typing2 6s steps(25) forwards; }
    .line3 { overflow: hidden; animation: typing3 6s steps(30) forwards; }
    .output { animation: fadein 6s ease forwards; }
  </style>

  <!-- Terminal window -->
  <rect class="bg" x="0" y="0" width="800" height="210" rx="8" ry="8"/>
  <rect class="border-line" x="0" y="0" width="800" height="210" rx="8" ry="8" fill="none" stroke-width="1"/>

  <!-- Title bar -->
  <rect class="title-bar" x="0" y="0" width="800" height="32" rx="8" ry="8"/>
  <rect class="title-bar" x="0" y="20" width="800" height="12"/>
  <line class="border-line" x1="0" y1="32" x2="800" y2="32" stroke-width="1"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="16" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="16" r="6" fill="#febc2e"/>
  <circle cx="60" cy="16" r="6" fill="#28c840"/>

  <!-- Title -->
  <text class="title-text" x="400" y="20" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, monospace" font-size="12">michael@github ~ /theluckystrike</text>

  <!-- Line 1: whoami -->
  <text class="prompt" x="20" y="62" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, monospace" font-size="14" font-weight="bold">$</text>
  <svg x="32" y="48" height="20">
    <g class="line1">
      <text class="cmd-text" x="0" y="14" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, monospace" font-size="14">whoami</text>
      <text class="comment" x="65" y="14" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, monospace" font-size="14"> # Michael Lip - Solo Dev</text>
    </g>
  </svg>

  <!-- Line 2: mission -->
  <text class="prompt" x="20" y="92" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, monospace" font-size="14" font-weight="bold">$</text>
  <svg x="32" y="78" height="20">
    <g class="line2">
      <text class="cmd-text" x="0" y="14" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, monospace" font-size="14">cat mission.txt</text>
      <text class="comment" x="120" y="14" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, monospace" font-size="14"> # 100 extensions</text>
    </g>
  </svg>

  <!-- Line 3: status -->
  <text class="prompt" x="20" y="122" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, monospace" font-size="14" font-weight="bold">$</text>
  <svg x="32" y="108" height="20">
    <g class="line3">
      <text class="cmd-text" x="0" y="14" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, monospace" font-size="14">echo $STATUS</text>
      <text class="comment" x="115" y="14" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, monospace" font-size="14"> # shipping extension #21</text>
    </g>
  </svg>

  <!-- Output block -->
  <g class="output">
    <text class="highlight" x="20" y="157" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, monospace" font-size="13">  ----</text>
    <text class="cmd-text" x="20" y="175" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, monospace" font-size="13">  20 extensions shipped  |  3,500+ users  |  privacy-first  |  no VC</text>
    <text class="highlight" x="20" y="193" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, monospace" font-size="13">  ----</text>
  </g>

  <!-- Blinking cursor at end of line 3 -->
  <rect class="cursor highlight" x="418" y="115" width="8" height="14" rx="1"/>
</svg>
