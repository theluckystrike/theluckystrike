      <div class="block">
        <div class="row"><span class="dim">why a retainer beats a project for ai work:</span></div>
        <div class="blank"></div>
        <div class="row"><span class="muted">  </span><span class="arrow">-&gt;</span><span class="muted">  ai roadmaps shift weekly. a retainer lets us pivot without re-scoping.</span></div>
        <div class="row"><span class="muted">  </span><span class="arrow">-&gt;</span><span class="muted">  evals + prompts need maintenance. models update, your system drifts.</span></div>
