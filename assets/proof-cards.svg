<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 380" width="100%" fill="none">
  <foreignObject x="0" y="0" width="840" height="380">
    <div xmlns="http://www.w3.org/1999/xhtml" style="width:840px;height:380px;">
      <style>
        .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;height:100%;box-sizing:border-box}
        .card{background:#13100c;border:1px solid #2a241d;border-radius:6px;padding:18px;box-sizing:border-box;overflow:hidden}
        .title{color:#e6edf3;font:500 16px/1.3 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;margin:0 0 6px}
        .desc{color:#a89b8a;font:400 14px/1.4 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;margin:0 0 10px}
        .stats{margin:0 0 10px;padding:0;list-style:none}
        .stats li{font:400 13px/1.7 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:#a89b8a}
        .stats li span.k{color:#7a6f62;display:inline-block;width:110px}
        .links{font:400 13px/1 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
        .links a{color:#d97757;text-decoration:none}
        .links .sep{color:#7a6f62;margin:0 2px}
      </style>
      <div class="grid">
        <div class="card">
          <p class="title">tab-suspender-pro</p>
          <p class="desc">The great suspender replacement. 2M stranded -- live in 14 days.</p>
          <ul class="stats">
            <li><span class="k">installs/day</span> 200+</li>
            <li><span class="k">rating</span> 4.6 / 5</li>
            <li><span class="k">data.sent</span> 0 bytes</li>
            <li><span class="k">license</span> bsl-1.1</li>
          </ul>
          <div class="links"><a href="#">source</a><span class="sep"> · </span><a href="#">chrome web store</a></div>
        </div>
        <div class="card">
          <p class="title">belikenative · mcp grammar server</p>
          <p class="desc">70 rules · 18 L1-aware. Claude Desktop &amp; Cursor.</p>
          <ul class="stats">
            <li><span class="k">rules</span> 70 · 18 l1-aware</li>
            <li><span class="k">ext.users</span> 10k+</li>
            <li><span class="k">rating</span> 4.6 / 5</li>
            <li><span class="k">license</span> mit</li>
          </ul>
          <div class="links"><a href="#">action</a><span class="sep"> · </span><a href="#">extension</a></div>
        </div>
        <div class="card">
          <p class="title">chrome-extension-toolkit</p>
          <p class="desc">TS-first MV3 scaffolding. The starter for every client build.</p>
          <ul class="stats">
            <li><span class="k">language</span> typescript</li>
            <li><span class="k">manifest</span> v3</li>
            <li><span class="k">used.in</span> 12+ extensions</li>
          </ul>
          <div class="links"><a href="#">repo</a></div>
        </div>
        <div class="card">
          <p class="title">content engine · the funnel</p>
          <p class="desc">chrome-tips · claude-skills-guide · ai-tools-compared.</p>
          <ul class="stats">
            <li><span class="k">articles</span> 4,200+</li>
            <li><span class="k">cadence</span> daily</li>
            <li><span class="k">views</span> 1,700+ / mo</li>
          </ul>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>