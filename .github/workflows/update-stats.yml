name: Update CWS Stats
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/update-stats.js
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update extension stats'
