<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>theluckystrike // dino run</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #010409;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .terminal {
      width: 100%;
      max-width: 820px;
      background-color: #0D1117;
      border: 1px solid #30363d;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 16px 48px rgba(0,0,0,0.4);
    }

    .terminal-titlebar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background-color: #161b22;
      border-bottom: 1px solid #30363d;
      user-select: none;
    }

    .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .dot.red { background-color: #ff5f57; }
    .dot.yellow { background-color: #febc2e; }
    .dot.green { background-color: #28c840; }

    .terminal-title {
      flex: 1;
      text-align: center;
      font-size: 13px;
      color: #8b949e;
      margin-right: 44px;
    }

    .terminal-body { padding: 24px; }

    #welcomeMsg {
      margin-bottom: 20px;
      line-height: 1.7;
      font-size: 14px;
      color: #8b949e;
    }
    #welcomeMsg .prompt { color: #7ee787; }
    #welcomeMsg p { margin-bottom: 6px; }

    #gameCanvas {
      display: block;
      width: 100%;
      max-width: 800px;
      background-color: #f7f7f7;
      border-radius: 4px;
      margin-bottom: 16px;
      cursor: pointer;
    }

    #scoreDisplay {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      font-size: 14px;
      border-bottom: 1px solid #30363d;
      margin-bottom: 16px;
    }
    .label { color: #8b949e; }
    .value { color: #7ee787; font-weight: 600; }

    #leaderboard {
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid #30363d;
    }
    .leaderboard-title { color: #7ee787; font-size: 14px; margin-bottom: 10px; }

    #leaderboard table { width: 100%; border-collapse: collapse; font-size: 13px; }
    #leaderboard thead th {
      text-align: left; color: #8b949e; font-weight: 400;
      padding: 4px 12px 4px 0; border-bottom: 1px solid #21262d;
    }
    #leaderboard tbody td {
      padding: 6px 12px 6px 0; color: #e6edf3; border-bottom: 1px solid #21262d;
    }
    #leaderboard tbody td.rank { color: #8b949e; width: 40px; }
    #leaderboard tbody td.name { color: #7ee787; }
    #leaderboard tbody td.score-col { text-align: right; font-variant-numeric: tabular-nums; }
    .empty-row td { color: #484f58; }

    #nameEntry {
      display: none;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid #30363d;
    }
    .name-prompt { color: #7ee787; font-size: 14px; margin-bottom: 10px; }
    .input-row { display: flex; gap: 10px; align-items: center; }

    #nameEntry input[type="text"] {
      flex: 1;
      background-color: #0D1117;
      border: 1px solid #7ee787;
      border-radius: 6px;
      color: #e6edf3;
      font-family: inherit;
      font-size: 14px;
      padding: 8px 12px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #nameEntry input::placeholder { color: #484f58; }
    #nameEntry input:focus { box-shadow: 0 0 0 2px rgba(126,231,135,0.15); }

    #nameEntry button {
      background-color: #238636;
      color: #fff;
      border: 1px solid #2ea043;
      border-radius: 6px;
      font-family: inherit;
      font-size: 14px;
      padding: 8px 18px;
      cursor: pointer;
      transition: background-color 0.2s;
      white-space: nowrap;
    }
    #nameEntry button:hover { background-color: #2ea043; }

    .instructions { font-size: 13px; color: #484f58; text-align: center; padding-top: 4px; }

    @media (max-width: 600px) {
      body { padding: 10px; align-items: flex-start; padding-top: 20px; }
      .terminal-body { padding: 16px; }
      .terminal-title { font-size: 11px; }
      #scoreDisplay { flex-direction: column; gap: 6px; align-items: flex-start; }
      .input-row { flex-direction: column; }
      #nameEntry button { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="terminal">
    <div class="terminal-titlebar">
      <div class="dot red"></div>
      <div class="dot yellow"></div>
      <div class="dot green"></div>
      <span class="terminal-title">theluckystrike@github ~ /dino-run</span>
    </div>
    <div class="terminal-body">
      <div id="welcomeMsg">
        <p><span class="prompt">$</span> While you're here, take a break from scrolling.</p>
        <p><span class="prompt">$</span> Jump over cacti, beat the high score, enjoy the ride.</p>
      </div>

      <canvas id="gameCanvas" width="800" height="250"></canvas>

      <div id="scoreDisplay">
        <span><span class="label">score </span><span class="value" id="currentScore">00000</span></span>
        <span><span class="label">hi </span><span class="value" id="highScore">00000</span></span>
      </div>

      <div id="leaderboard">
        <div class="leaderboard-title">$ cat leaderboard.txt</div>
        <table>
          <thead>
            <tr><th>#</th><th>name</th><th style="text-align:right;">score</th></tr>
          </thead>
          <tbody id="leaderboardBody"></tbody>
        </table>
      </div>

      <form id="nameEntry">
        <div class="name-prompt">$ New high score! Enter your name</div>
        <div class="input-row">
          <input type="text" id="playerName" placeholder="your_name" maxlength="16" autocomplete="off" spellcheck="false">
          <button type="submit">submit</button>
        </div>
      </form>

      <div class="instructions">Press SPACE or tap to jump. Press SPACE to start.</div>
    </div>
  </div>

<script>
// ============================================================================
// GAME ENGINE
// ============================================================================
(function(){
  "use strict";
  var W=800,H=250,GY=200,GRAV=0.6,JF=-12,IS=5,MS=14,SI=0.001;
  var DW=40,DH=44,DX=60;

  function ri(a,b){return Math.floor(Math.random()*(b-a+1))+a}
  function rf(a,b){return Math.random()*(b-a)+a}
  function hit(ax,ay,aw,ah,bx,by,bw,bh){return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by}

  function Cloud(x,y,s){this.x=x;this.y=y;this.s=s||1}
  Cloud.prototype.update=function(sp){this.x-=sp*0.3;if(this.x<-80){this.x=W+ri(20,200);this.y=ri(30,100);this.s=rf(0.6,1.2)}};
  Cloud.prototype.draw=function(c){c.fillStyle="#e0e0e0";var s=this.s;c.fillRect(this.x,this.y,40*s,14*s);c.fillRect(this.x+8*s,this.y-8*s,24*s,10*s);c.fillRect(this.x+20*s,this.y-14*s,16*s,10*s)};

  function Cactus(x,w,h){this.x=x;this.w=w;this.h=h;this.y=GY-h;this.dbl=Math.random()<0.3}
  Cactus.prototype.update=function(sp){this.x-=sp};
  Cactus.prototype.draw=function(c){
    c.fillStyle="#2d6e2d";c.fillRect(this.x,this.y,this.w,this.h);
    c.fillRect(this.x-6,this.y+this.h*0.3,6,8);c.fillRect(this.x-6,this.y+this.h*0.3-6,3,6);
    c.fillRect(this.x+this.w,this.y+this.h*0.5,6,8);c.fillRect(this.x+this.w+3,this.y+this.h*0.5-6,3,6);
    if(this.dbl){var x2=this.x+this.w+4,h2=this.h*0.75;c.fillRect(x2,GY-h2,this.w*0.8,h2)}
  };
  Cactus.prototype.bounds=function(){var tw=this.dbl?this.w+4+this.w*0.8:this.w;return{x:this.x+4,y:this.y+4,w:tw-8,h:this.h-4}};

  function Bump(x){this.x=x;this.t=ri(0,2)}
  Bump.prototype.update=function(sp){this.x-=sp;if(this.x<-10){this.x=W+ri(10,60);this.t=ri(0,2)}};
  Bump.prototype.draw=function(c){c.fillStyle="#a0a0a0";var y=GY+4;if(this.t===0)c.fillRect(this.x,y,3,2);else if(this.t===1)c.fillRect(this.x,y,6,1);else{c.fillRect(this.x,y,2,2);c.fillRect(this.x+5,y+2,2,2)}};

  function Dino(){this.x=DX;this.y=GY-DH;this.w=DW;this.h=DH;this.vy=0;this.g=true;this.af=0;this.at=0}
  Dino.prototype.jump=function(){if(this.g){this.vy=JF;this.g=false}};
  Dino.prototype.update=function(){if(!this.g){this.vy+=GRAV;this.y+=this.vy;if(this.y>=GY-DH){this.y=GY-DH;this.vy=0;this.g=true}}this.at++;if(this.at>=6){this.at=0;this.af=this.af===0?1:0}};
  Dino.prototype.draw=function(c,st){
    var x=this.x,y=this.y;
    c.fillStyle="#535353";
    c.fillRect(x+8,y+4,24,26);c.fillRect(x+16,y,24,18);
    c.fillStyle="#f7f7f7";c.fillRect(x+34,y+10,6,4);c.fillStyle="#535353";
    c.fillStyle="#fff";c.fillRect(x+30,y+4,5,5);c.fillStyle="#000";c.fillRect(x+32,y+5,3,3);c.fillStyle="#535353";
    c.fillRect(x,y+10,10,6);c.fillRect(x-2,y+8,4,4);
    c.fillRect(x+26,y+22,4,8);c.fillRect(x+28,y+28,3,2);
    if(st!=="playing"||!this.g){c.fillRect(x+10,y+30,8,14);c.fillRect(x+22,y+30,8,14);c.fillRect(x+10,y+42,10,2);c.fillRect(x+22,y+42,10,2)}
    else if(this.af===0){c.fillRect(x+10,y+30,8,14);c.fillRect(x+10,y+42,10,2);c.fillRect(x+24,y+30,8,8)}
    else{c.fillRect(x+22,y+30,8,14);c.fillRect(x+22,y+42,10,2);c.fillRect(x+8,y+30,8,8)}
  };
  Dino.prototype.bounds=function(){return{x:this.x+5,y:this.y+5,w:this.w-10,h:this.h-5}};
  Dino.prototype.reset=function(){this.y=GY-DH;this.vy=0;this.g=true;this.af=0;this.at=0};

  var G={canvas:null,ctx:null,state:"waiting",dino:null,cacti:[],clouds:[],bumps:[],speed:IS,score:0,st:0,hi:0,fid:null};

  G.init=function(cv){
    if(typeof cv==="string")cv=document.getElementById(cv);
    this.canvas=cv;this.ctx=cv.getContext("2d");cv.width=W;cv.height=H;
    this.dino=new Dino();this.clouds=[];this.bumps=[];
    for(var i=0;i<4;i++)this.clouds.push(new Cloud(ri(0,W),ri(30,100),rf(0.6,1.2)));
    for(var j=0;j<30;j++)this.bumps.push(new Bump(ri(0,W)));
    var self=this;
    document.addEventListener("keydown",function(e){if(e.code==="Space"||e.code==="ArrowUp"){e.preventDefault();self._act()}});
    cv.addEventListener("mousedown",function(e){e.preventDefault();self._act()});
    cv.addEventListener("touchstart",function(e){e.preventDefault();self._act()},{passive:false});
    this._loop();
  };

  G._act=function(){if(this.state==="waiting")this.start();else if(this.state==="playing")this.dino.jump();else if(this.state==="gameover"){this.reset();this.start()}};

  G.start=function(){
    if(this.state==="playing")return;
    this.state="playing";this.score=0;this.st=0;this.speed=IS;this.cacti=[];this.dino.reset();
    this.cacti.push(new Cactus(W+ri(200,400),ri(18,30),ri(30,55)));
    if(typeof window.onGameStart==="function")window.onGameStart();
  };

  G.reset=function(){this.state="waiting";this.score=0;this.st=0;this.speed=IS;this.cacti=[];this.dino.reset()};

  G._over=function(){
    this.state="gameover";
    if(this.score>this.hi)this.hi=this.score;
    if(typeof window.onGameOver==="function")window.onGameOver(this.score);
  };

  G._update=function(){
    if(this.state!=="playing")return;
    if(this.speed<MS)this.speed+=SI;
    this.st+=this.speed;if(this.st>=10){this.score+=Math.floor(this.st/10);this.st=this.st%10}
    this.dino.update();
    for(var i=this.cacti.length-1;i>=0;i--){this.cacti[i].update(this.speed);if(this.cacti[i].x+this.cacti[i].w<-20)this.cacti.splice(i,1)}
    if(this.cacti.length===0)this.cacti.push(new Cactus(W+ri(50,150),ri(18,30),ri(30,55)));
    else{var l=this.cacti[this.cacti.length-1];if(l.x<W-ri(300,600))this.cacti.push(new Cactus(W+ri(50,150),ri(18,30),ri(30,55)))}
    for(var c=0;c<this.clouds.length;c++)this.clouds[c].update(this.speed);
    for(var b=0;b<this.bumps.length;b++)this.bumps[b].update(this.speed);
    var db=this.dino.bounds();
    for(var j=0;j<this.cacti.length;j++){var cb=this.cacti[j].bounds();if(hit(db.x,db.y,db.w,db.h,cb.x,cb.y,cb.w,cb.h)){this._over();return}}
    if(typeof window.onScoreUpdate==="function")window.onScoreUpdate(this.score);
  };

  G._draw=function(){
    var c=this.ctx;c.fillStyle="#f7f7f7";c.fillRect(0,0,W,H);
    for(var i=0;i<this.clouds.length;i++)this.clouds[i].draw(c);
    c.fillStyle="#535353";c.fillRect(0,GY,W,2);
    for(var b=0;b<this.bumps.length;b++)this.bumps[b].draw(c);
    for(var j=0;j<this.cacti.length;j++)this.cacti[j].draw(c);
    this.dino.draw(c,this.state);
    if(this.state==="waiting"){c.font="18px monospace";c.fillStyle="#535353";c.textAlign="center";c.fillText("Press Space or Tap to Start",W/2,H/2-10)}
    else if(this.state==="gameover"){c.font="20px monospace";c.fillStyle="#535353";c.textAlign="center";c.fillText("G A M E   O V E R",W/2,H/2-20);c.font="14px monospace";c.fillText("Press Space or Tap to Restart",W/2,H/2+10)}
  };

  G._loop=function(){this._update();this._draw();this.fid=requestAnimationFrame(this._loop.bind(this))};

  window.DinoGame=G;
})();

// ============================================================================
// SCOREBOARD + UI INTEGRATION
// ============================================================================
(function(){
  "use strict";
  var KEY="dinoRunLeaderboard",NKEY="dinoRunPlayerName",scores=[];

  function load(){try{var r=localStorage.getItem(KEY);scores=r?JSON.parse(r):[]}catch(e){scores=[]}}
  function save(){localStorage.setItem(KEY,JSON.stringify(scores))}
  function fmt(n){return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g,",")}
  function pad5(n){return String(n).padStart(5,"0")}
  function highScore(){return scores.length?scores[0].score:0}

  function renderBoard(){
    var tb=document.getElementById("leaderboardBody");
    if(!tb)return;
    tb.innerHTML="";
    if(scores.length===0){
      for(var e=0;e<5;e++){var er=document.createElement("tr");er.className="empty-row";er.innerHTML='<td class="rank">'+(e+1)+'</td><td class="name">---</td><td class="score-col" style="text-align:right">---</td>';tb.appendChild(er)}
      return;
    }
    var n=Math.min(scores.length,5);
    for(var i=0;i<n;i++){var r=document.createElement("tr");r.innerHTML='<td class="rank">'+(i+1)+'</td><td class="name">'+scores[i].name+'</td><td class="score-col" style="text-align:right">'+fmt(scores[i].score)+'</td>';tb.appendChild(r)}
    for(var j=n;j<5;j++){var er2=document.createElement("tr");er2.className="empty-row";er2.innerHTML='<td class="rank">'+(j+1)+'</td><td class="name">---</td><td class="score-col" style="text-align:right">---</td>';tb.appendChild(er2)}
  }

  function updateScore(s){
    var cs=document.getElementById("currentScore"),hs=document.getElementById("highScore");
    if(cs)cs.textContent=pad5(s);
    if(hs)hs.textContent=pad5(Math.max(highScore(),s));
  }

  window.onScoreUpdate=function(s){updateScore(s)};

  window.onGameStart=function(){
    document.getElementById("nameEntry").style.display="none";
    updateScore(0);
  };

  window.onGameOver=function(score){
    updateScore(score);
    if(score<=0)return;
    var form=document.getElementById("nameEntry");
    var input=document.getElementById("playerName");
    form.style.display="";
    try{var ln=localStorage.getItem(NKEY);if(ln)input.value=ln}catch(e){}
    input.focus();input.select();
  };

  document.getElementById("nameEntry").addEventListener("submit",function(e){
    e.preventDefault();
    var input=document.getElementById("playerName");
    var name=(input.value.trim()||"visitor").replace(/[<>&"']/g,"");
    try{localStorage.setItem(NKEY,name)}catch(e){}
    var sc=parseInt(document.getElementById("currentScore").textContent)||0;
    scores.push({name:name,score:sc,date:new Date().toISOString()});
    scores.sort(function(a,b){return b.score-a.score});
    if(scores.length>10)scores=scores.slice(0,10);
    save();renderBoard();
    document.getElementById("nameEntry").style.display="none";
  });

  // Canvas responsive sizing
  var cv=document.getElementById("gameCanvas");
  function resize(){
    var pw=cv.parentElement.clientWidth;
    if(pw<800){cv.style.width=pw+"px";cv.style.height=Math.floor(250*(pw/800))+"px"}
    else{cv.style.width="800px";cv.style.height="250px"}
  }
  window.addEventListener("resize",resize);
  resize();

  // Init
  load();renderBoard();updateScore(0);
  window.DinoGame.init(cv);
})();
</script>
</body>
</html>
