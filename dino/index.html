<script>
// ============================================================================
// TYPING ANIMATION
// ============================================================================
document.addEventListener("DOMContentLoaded", function () {
  var CHAR_DELAY = 30;
  var LINE_PAUSE = 300;
  var BLINK_COUNT = 3;
  var BLINK_INTERVAL = 700;
  var SESSION_KEY = "welcomeAnimationPlayed";

  var container = document.getElementById("welcomeMsg");
  if (!container) return;

  var paragraphs = container.querySelectorAll("p");
  if (paragraphs.length < 2) return;

  var lines = Array.from(paragraphs).map(function (p) {
    var prompt = p.querySelector(".prompt");
    var fullText = "";
    for (var i = 0; i < p.childNodes.length; i++) {
      var node = p.childNodes[i];
      if (node !== prompt) fullText += node.textContent;
    }
    return { el: p, prompt: prompt, text: fullText };
  });

  if (sessionStorage.getItem(SESSION_KEY)) return;

  lines.forEach(function (line) {
    line.el.textContent = "";
    line.el.appendChild(line.prompt);
    line.textNode = document.createTextNode("");
    line.el.appendChild(line.textNode);
  });

  var cursor = document.createElement("span");
  cursor.className = "cursor";
  cursor.textContent = "\u2588";

  function typeLine(line, onComplete) {
    line.el.appendChild(cursor);
    var index = 0;
    var text = line.text;
    function typeNext() {
      if (index < text.length) {
        line.textNode.textContent += text.charAt(index);
        index++;
        setTimeout(typeNext, CHAR_DELAY);
      } else {
        onComplete();
      }
    }
    typeNext();
  }

  function blinkAndRemoveCursor() {
    var blinks = 0;
    var timer = setInterval(function () {
      blinks++;
      if (blinks >= BLINK_COUNT) {
        clearInterval(timer);
        if (cursor.parentNode) cursor.parentNode.removeChild(cursor);
      }
    }, BLINK_INTERVAL);
  }

  typeLine(lines[0], function () {
    setTimeout(function () {
      if (cursor.parentNode) cursor.parentNode.removeChild(cursor);
      typeLine(lines[1], function () {
        blinkAndRemoveCursor();
        sessionStorage.setItem(SESSION_KEY, "1");
      });
    }, LINE_PAUSE);
  });
});

// ============================================================================
// LOBSTER SPRITE
// ============================================================================
function drawLobster(ctx, x, y, animFrame) {
  var RED = '#e74c3c';
  var DARK = '#c0392b';
  var WHITE = '#ffffff';
  var CYAN = '#00e5cc';

  var s = 2;

  function px(col, row, color) {
    ctx.fillStyle = color;
    ctx.fillRect(x + col * s, y + row * s, s, s);
  }
  function run(col, row, len, color) {
    ctx.fillStyle = color;
    ctx.fillRect(x + col * s, y + row * s, len * s, s);
  }
  function rect(col, row, w, h, color) {
    ctx.fillStyle = color;
    ctx.fillRect(x + col * s, y + row * s, w * s, h * s);
  }

  // ANTENNAE
  px(13, 0, DARK); px(14, 1, DARK); px(14, 2, DARK); px(13, 3, DARK);
  px(16, 0, DARK); px(15, 1, DARK); px(15, 2, DARK); px(16, 3, DARK);

  // HEAD
  run(11, 4, 7, RED); run(10, 5, 9, RED); run(10, 6, 9, RED);
  run(10, 7, 9, RED); run(11, 8, 7, RED);

  // Eyes
  px(17, 5, WHITE); px(18, 5, WHITE); px(17, 6, WHITE); px(18, 6, CYAN);
  px(15, 5, WHITE); px(16, 5, WHITE); px(15, 6, WHITE); px(16, 6, CYAN);

  // BODY SEGMENTS
  run(9, 9, 9, RED); run(9, 10, 9, DARK);
  run(7, 11, 12, RED); run(7, 12, 12, RED); run(7, 13, 12, DARK);
  run(6, 14, 13, RED); run(6, 15, 13, RED); run(6, 16, 13, DARK);

  // ABDOMEN / TAIL
  run(4, 17, 13, RED); run(4, 18, 13, DARK);
  run(2, 19, 12, RED); run(2, 20, 12, DARK);
  run(0, 21, 10, RED); run(0, 22, 10, DARK);

  // Tail fan
  px(0, 21, DARK); run(0, 22, 2, DARK);
  px(0, 23, DARK); px(1, 23, RED); px(2, 23, DARK);
  px(4, 23, DARK); px(5, 23, RED); px(6, 23, DARK);
  px(8, 23, DARK); px(9, 23, RED);

  // UPPER CLAW
  run(19, 8, 3, RED); run(19, 9, 3, RED);
  rect(22, 6, 2, 2, DARK); rect(22, 7, 4, 2, RED); rect(24, 6, 2, 2, RED);
  px(26, 7, DARK);
  rect(22, 9, 4, 2, RED); px(26, 9, DARK); rect(22, 10, 2, 1, DARK);
  px(25, 8, RED); px(26, 8, DARK);
  px(22, 6, DARK); px(23, 6, DARK); px(24, 5, DARK); px(25, 5, DARK);
  px(25, 6, RED); px(26, 6, DARK); px(26, 10, DARK);
  px(25, 11, DARK); px(24, 11, DARK); px(22, 11, DARK); px(23, 11, DARK);

  // LOWER CLAW
  run(19, 12, 3, RED); run(19, 13, 3, RED);
  rect(22, 11, 4, 2, RED); px(26, 11, DARK);
  rect(22, 13, 4, 2, RED); px(26, 14, DARK);
  px(25, 12, RED);
  rect(22, 15, 2, 1, DARK); px(24, 15, DARK); px(25, 15, DARK);
  px(26, 13, DARK); px(22, 10, DARK);

  // LEGS (animated)
  if (animFrame === 0) {
    px(15, 17, DARK); px(16, 18, DARK); px(16, 19, DARK);
    px(12, 17, DARK); px(12, 18, DARK); px(12, 19, DARK);
    px(9, 17, DARK); px(8, 18, DARK); px(8, 19, DARK);
    px(6, 17, DARK); px(5, 18, DARK); px(4, 19, DARK);
  } else {
    px(15, 17, DARK); px(14, 18, DARK); px(14, 19, DARK);
    px(12, 17, DARK); px(12, 18, DARK); px(12, 19, DARK);
    px(9, 17, DARK); px(10, 18, DARK); px(10, 19, DARK);
    px(6, 17, DARK); px(7, 18, DARK); px(8, 19, DARK);
  }
}

function drawLobsterStanding(ctx, x, y) {
  var RED = '#e74c3c';
  var DARK = '#c0392b';
  var WHITE = '#ffffff';
  var CYAN = '#00e5cc';

  var s = 2;

  function px(col, row, color) {
    ctx.fillStyle = color;
    ctx.fillRect(x + col * s, y + row * s, s, s);
  }
  function run(col, row, len, color) {
    ctx.fillStyle = color;
    ctx.fillRect(x + col * s, y + row * s, len * s, s);
  }
  function rect(col, row, w, h, color) {
    ctx.fillStyle = color;
    ctx.fillRect(x + col * s, y + row * s, w * s, h * s);
  }

  // ANTENNAE
  px(13, 0, DARK); px(14, 1, DARK); px(14, 2, DARK); px(13, 3, DARK);
  px(16, 0, DARK); px(15, 1, DARK); px(15, 2, DARK); px(16, 3, DARK);

  // HEAD
  run(11, 4, 7, RED); run(10, 5, 9, RED); run(10, 6, 9, RED);
  run(10, 7, 9, RED); run(11, 8, 7, RED);

  // Eyes
  px(17, 5, WHITE); px(18, 5, WHITE); px(17, 6, WHITE); px(18, 6, CYAN);
  px(15, 5, WHITE); px(16, 5, WHITE); px(15, 6, WHITE); px(16, 6, CYAN);

  // BODY SEGMENTS
  run(9, 9, 9, RED); run(9, 10, 9, DARK);
  run(7, 11, 12, RED); run(7, 12, 12, RED); run(7, 13, 12, DARK);
  run(6, 14, 13, RED); run(6, 15, 13, RED); run(6, 16, 13, DARK);

  // ABDOMEN / TAIL
  run(4, 17, 13, RED); run(4, 18, 13, DARK);
  run(2, 19, 12, RED); run(2, 20, 12, DARK);
  run(0, 21, 10, RED); run(0, 22, 10, DARK);

  // Tail fan
  px(0, 21, DARK); run(0, 22, 2, DARK);
  px(0, 23, DARK); px(1, 23, RED); px(2, 23, DARK);
  px(4, 23, DARK); px(5, 23, RED); px(6, 23, DARK);
  px(8, 23, DARK); px(9, 23, RED);

  // UPPER CLAW (raised)
  run(19, 7, 3, RED); run(19, 8, 3, RED);
  rect(22, 4, 2, 2, DARK); rect(22, 5, 4, 2, RED); rect(24, 4, 2, 2, RED);
  px(26, 5, DARK);
  rect(22, 7, 4, 2, RED); px(26, 7, DARK); rect(22, 9, 2, 1, DARK);
  px(25, 6, RED); px(26, 6, DARK);
  px(22, 4, DARK); px(23, 4, DARK); px(24, 3, DARK); px(25, 3, DARK);
  px(25, 4, RED); px(26, 4, DARK); px(26, 8, DARK);
  px(25, 9, DARK); px(24, 9, DARK); px(22, 9, DARK); px(23, 9, DARK);

  // LOWER CLAW (raised)
  run(19, 11, 3, RED); run(19, 12, 3, RED);
  rect(22, 10, 4, 2, RED); px(26, 10, DARK);
  rect(22, 12, 4, 2, RED); px(26, 13, DARK);
  px(25, 11, RED);
  rect(22, 14, 2, 1, DARK); px(24, 14, DARK); px(25, 14, DARK);
  px(26, 12, DARK); px(22, 9, DARK);

  // LEGS (all straight down)
  px(15, 17, DARK); px(15, 18, DARK); px(15, 19, DARK);
  px(12, 17, DARK); px(12, 18, DARK); px(12, 19, DARK);
  px(9, 17, DARK); px(9, 18, DARK); px(9, 19, DARK);
  px(6, 17, DARK); px(6, 18, DARK); px(6, 19, DARK);
}

// ============================================================================
// GAME ENGINE
// ============================================================================
(function(){
  "use strict";
  var W=800,H=250,GY=200,GRAV=0.6,JF=-12,IS=5,MS=14,SI=0.001;
  var DW=54,DH=48,DX=60;

  function ri(a,b){return Math.floor(Math.random()*(b-a+1))+a}
  function rf(a,b){return Math.random()*(b-a)+a}
  function hit(ax,ay,aw,ah,bx,by,bw,bh){return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by}

  function Cloud(x,y,s){this.x=x;this.y=y;this.s=s||1}
  Cloud.prototype.update=function(sp){this.x-=sp*0.3;if(this.x<-80){this.x=W+ri(20,200);this.y=ri(30,100);this.s=rf(0.6,1.2)}};
  Cloud.prototype.draw=function(c){c.fillStyle="#e0e0e0";var s=this.s;c.fillRect(this.x,this.y,40*s,14*s);c.fillRect(this.x+8*s,this.y-8*s,24*s,10*s);c.fillRect(this.x+20*s,this.y-14*s,16*s,10*s)};

  function Cactus(x,w,h){this.x=x;this.w=w;this.h=h;this.y=GY-h;this.dbl=Math.random()<0.3}
  Cactus.prototype.update=function(sp){this.x-=sp};
  Cactus.prototype.draw=function(c){
    c.fillStyle="#2d6e2d";c.fillRect(this.x,this.y,this.w,this.h);
    c.fillRect(this.x-6,this.y+this.h*0.3,6,8);c.fillRect(this.x-6,this.y+this.h*0.3-6,3,6);
    c.fillRect(this.x+this.w,this.y+this.h*0.5,6,8);c.fillRect(this.x+this.w+3,this.y+this.h*0.5-6,3,6);
    if(this.dbl){var x2=this.x+this.w+4,h2=this.h*0.75;c.fillRect(x2,GY-h2,this.w*0.8,h2)}
  };
  Cactus.prototype.bounds=function(){var tw=this.dbl?this.w+4+this.w*0.8:this.w;return{x:this.x+4,y:this.y+4,w:tw-8,h:this.h-4}};

  function Bump(x){this.x=x;this.t=ri(0,2)}
  Bump.prototype.update=function(sp){this.x-=sp;if(this.x<-10){this.x=W+ri(10,60);this.t=ri(0,2)}};
  Bump.prototype.draw=function(c){c.fillStyle="#a0a0a0";var y=GY+4;if(this.t===0)c.fillRect(this.x,y,3,2);else if(this.t===1)c.fillRect(this.x,y,6,1);else{c.fillRect(this.x,y,2,2);c.fillRect(this.x+5,y+2,2,2)}};

  function Player(){this.x=DX;this.y=GY-DH;this.w=DW;this.h=DH;this.vy=0;this.g=true;this.af=0;this.at=0}
  Player.prototype.jump=function(){if(this.g){this.vy=JF;this.g=false}};
  Player.prototype.update=function(){if(!this.g){this.vy+=GRAV;this.y+=this.vy;if(this.y>=GY-DH){this.y=GY-DH;this.vy=0;this.g=true}}this.at++;if(this.at>=6){this.at=0;this.af=this.af===0?1:0}};
  Player.prototype.draw=function(c,st){
    var x=this.x,y=this.y;
    if(st==="playing"&&this.g){
      drawLobster(c,x,y,this.af);
    } else {
      drawLobsterStanding(c,x,y);
    }
  };
  Player.prototype.bounds=function(){return{x:this.x+5,y:this.y+5,w:this.w-10,h:this.h-5}};
  Player.prototype.reset=function(){this.y=GY-DH;this.vy=0;this.g=true;this.af=0;this.at=0};

  var G={canvas:null,ctx:null,state:"waiting",player:null,cacti:[],clouds:[],bumps:[],speed:IS,score:0,st:0,hi:0,fid:null};

  G.init=function(cv){
    if(typeof cv==="string")cv=document.getElementById(cv);
    this.canvas=cv;this.ctx=cv.getContext("2d");cv.width=W;cv.height=H;
    this.player=new Player();this.clouds=[];this.bumps=[];
    for(var i=0;i<4;i++)this.clouds.push(new Cloud(ri(0,W),ri(30,100),rf(0.6,1.2)));
    for(var j=0;j<30;j++)this.bumps.push(new Bump(ri(0,W)));
    var self=this;
    document.addEventListener("keydown",function(e){if(e.code==="Space"||e.code==="ArrowUp"){e.preventDefault();self._act()}});
    cv.addEventListener("mousedown",function(e){e.preventDefault();self._act()});
    cv.addEventListener("touchstart",function(e){e.preventDefault();self._act()},{passive:false});
    this._loop();
  };

  G._act=function(){if(this.state==="waiting")this.start();else if(this.state==="playing")this.player.jump();else if(this.state==="gameover"){this.reset();this.start()}};

  G.start=function(){
    if(this.state==="playing")return;
    this.state="playing";this.score=0;this.st=0;this.speed=IS;this.cacti=[];this.player.reset();
    this.cacti.push(new Cactus(W+ri(200,400),ri(18,30),ri(30,55)));
    if(typeof window.onGameStart==="function")window.onGameStart();
  };

  G.reset=function(){this.state="waiting";this.score=0;this.st=0;this.speed=IS;this.cacti=[];this.player.reset()};

  G._over=function(){
    this.state="gameover";
    if(this.score>this.hi)this.hi=this.score;
    if(typeof window.onGameOver==="function")window.onGameOver(this.score);
  };

  G._update=function(){
    if(this.state!=="playing")return;
    if(this.speed<MS)this.speed+=SI;
    this.st+=this.speed;if(this.st>=10){this.score+=Math.floor(this.st/10);this.st=this.st%10}
    this.player.update();
    for(var i=this.cacti.length-1;i>=0;i--){this.cacti[i].update(this.speed);if(this.cacti[i].x+this.cacti[i].w<-20)this.cacti.splice(i,1)}
    if(this.cacti.length===0)this.cacti.push(new Cactus(W+ri(50,150),ri(18,30),ri(30,55)));
    else{var l=this.cacti[this.cacti.length-1];if(l.x<W-ri(300,600))this.cacti.push(new Cactus(W+ri(50,150),ri(18,30),ri(30,55)))}
    for(var c=0;c<this.clouds.length;c++)this.clouds[c].update(this.speed);
    for(var b=0;b<this.bumps.length;b++)this.bumps[b].update(this.speed);
    var db=this.player.bounds();
    for(var j=0;j<this.cacti.length;j++){var cb=this.cacti[j].bounds();if(hit(db.x,db.y,db.w,db.h,cb.x,cb.y,cb.w,cb.h)){this._over();return}}
    if(typeof window.onScoreUpdate==="function")window.onScoreUpdate(this.score);
  };

  G._draw=function(){
    var c=this.ctx;c.fillStyle="#f7f7f7";c.fillRect(0,0,W,H);
    for(var i=0;i<this.clouds.length;i++)this.clouds[i].draw(c);
    c.fillStyle="#535353";c.fillRect(0,GY,W,2);
    for(var b=0;b<this.bumps.length;b++)this.bumps[b].draw(c);
    for(var j=0;j<this.cacti.length;j++)this.cacti[j].draw(c);
    this.player.draw(c,this.state);
    if(this.state==="waiting"){c.font="18px monospace";c.fillStyle="#535353";c.textAlign="center";c.fillText("Press Space or Tap to Start",W/2,H/2-10)}
    else if(this.state==="gameover"){c.font="20px monospace";c.fillStyle="#535353";c.textAlign="center";c.fillText("G A M E   O V E R",W/2,H/2-20);c.font="14px monospace";c.fillText("Press Space or Tap to Restart",W/2,H/2+10)}
  };

  G._loop=function(){this._update();this._draw();this.fid=requestAnimationFrame(this._loop.bind(this))};

  window.LobsterGame=G;
})();

// ============================================================================
// SCOREBOARD + UI INTEGRATION
// ============================================================================
(function(){
  "use strict";
  var KEY="dinoRunLeaderboard",NKEY="dinoRunPlayerName",scores=[];

  function load(){try{var r=localStorage.getItem(KEY);scores=r?JSON.parse(r):[]}catch(e){scores=[]}}
  function save(){localStorage.setItem(KEY,JSON.stringify(scores))}
  function fmt(n){return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g,",")}
  function pad5(n){return String(n).padStart(5,"0")}
  function highScore(){return scores.length?scores[0].score:0}

  function renderBoard(){
    var tb=document.getElementById("leaderboardBody");
    if(!tb)return;
    tb.innerHTML="";
    if(scores.length===0){
      for(var e=0;e<5;e++){var er=document.createElement("tr");er.className="empty-row";er.innerHTML='<td class="rank">'+(e+1)+'</td><td class="name">---</td><td class="score-col" style="text-align:right">---</td>';tb.appendChild(er)}
      return;
    }
    var n=Math.min(scores.length,5);
    for(var i=0;i<n;i++){var r=document.createElement("tr");r.innerHTML='<td class="rank">'+(i+1)+'</td><td class="name">'+scores[i].name+'</td><td class="score-col" style="text-align:right">'+fmt(scores[i].score)+'</td>';tb.appendChild(r)}
    for(var j=n;j<5;j++){var er2=document.createElement("tr");er2.className="empty-row";er2.innerHTML='<td class="rank">'+(j+1)+'</td><td class="name">---</td><td class="score-col" style="text-align:right">---</td>';tb.appendChild(er2)}
  }

  function updateScore(s){
    var cs=document.getElementById("currentScore"),hs=document.getElementById("highScore");
    if(cs)cs.textContent=pad5(s);
    if(hs)hs.textContent=pad5(Math.max(highScore(),s));
  }

  window.onScoreUpdate=function(s){updateScore(s)};

  window.onGameStart=function(){
    document.getElementById("nameEntry").style.display="none";
    updateScore(0);
  };

  window.onGameOver=function(score){
    updateScore(score);
    if(score<=0)return;
    var form=document.getElementById("nameEntry");
    var input=document.getElementById("playerName");
    form.style.display="";
    try{var ln=localStorage.getItem(NKEY);if(ln)input.value=ln}catch(e){}
    input.focus();input.select();
  };

  document.getElementById("nameEntry").addEventListener("submit",function(e){
    e.preventDefault();
    var input=document.getElementById("playerName");
    var name=(input.value.trim()||"visitor").replace(/[<>&"']/g,"");
    try{localStorage.setItem(NKEY,name)}catch(e){}
    var sc=parseInt(document.getElementById("currentScore").textContent)||0;
    scores.push({name:name,score:sc,date:new Date().toISOString()});
    scores.sort(function(a,b){return b.score-a.score});
    if(scores.length>10)scores=scores.slice(0,10);
    save();renderBoard();
    document.getElementById("nameEntry").style.display="none";
  });

  // Canvas responsive sizing
  var cv=document.getElementById("gameCanvas");
  function resize(){
    var pw=cv.parentElement.clientWidth;
    if(pw<800){cv.style.width=pw+"px";cv.style.height=Math.floor(250*(pw/800))+"px"}
    else{cv.style.width="800px";cv.style.height="250px"}
  }
  window.addEventListener("resize",resize);
  resize();

  // Init
  load();renderBoard();updateScore(0);
  window.LobsterGame.init(cv);
})();
</script>
